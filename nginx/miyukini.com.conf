# =============================================================================
# Nginx configuration for miyukini.com domain
# =============================================================================
# After deploying, run certbot to add SSL automatically:
#   certbot --nginx -d miyukini.com -d www.miyukini.com -d cog.miyukini.com
# =============================================================================

# --- miyukini.com — Main Portal ---
server {
    listen 80;
    listen [::]:80;
    server_name miyukini.com www.miyukini.com;

    root /var/www/portal;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# --- cog.miyukini.com — Miyukini COG Site ---
server {
    listen 80;
    listen [::]:80;
    server_name cog.miyukini.com;

    root /var/www/miyukini-cog;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
