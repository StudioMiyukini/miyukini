# =============================================================================
# Nginx configuration for miyukini.com domain
# =============================================================================
# Deploy this file to /etc/nginx/sites-available/ on your Hostinger VPS,
# then symlink to /etc/nginx/sites-enabled/
#
# Prerequisites:
#   1. DNS A records pointing to your VPS IP:
#      - miyukini.com      -> VPS_IP
#      - cog.miyukini.com  -> VPS_IP
#   2. SSL certificates via certbot (see README.md)
# =============================================================================

# --- miyukini.com — Main Portal ---
server {
    listen 80;
    listen [::]:80;
    server_name miyukini.com www.miyukini.com;

    # Redirect HTTP -> HTTPS
    return 301 https://miyukini.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name miyukini.com www.miyukini.com;

    # SSL — managed by certbot (paths will be updated after running certbot)
    ssl_certificate     /etc/letsencrypt/live/miyukini.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miyukini.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www -> apex
    if ($host = www.miyukini.com) {
        return 301 https://miyukini.com$request_uri;
    }

    root /var/www/miyukini/portal;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# --- cog.miyukini.com — Miyukini COG Site ---
server {
    listen 80;
    listen [::]:80;
    server_name cog.miyukini.com;

    return 301 https://cog.miyukini.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cog.miyukini.com;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/cog.miyukini.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cog.miyukini.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Point to the EXISTING COG site files (adjust path as needed)
    root /var/www/miyukini-cog;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
